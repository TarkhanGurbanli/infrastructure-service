version: '3.9'

# İnkişaf mühiti üçün Docker Compose
# İstifadə: docker compose up -d

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zefflix-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-zefflix-redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-zefflix-redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zefflix-net

  # ── Config Server ────────────────────────────────────────────────────────────
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: zefflix-config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-zefflix}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-zefflix-secret}
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/TarkhanGurbanli/zefflix-config}
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH:-main}
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider",
              "http://localhost:8888/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zefflix-net

  # ── Eureka Server ────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: zefflix-eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider",
              "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - zefflix-net

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: zefflix-api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zefflix-redis}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-32-chars!!}
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret}
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-zefflix}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-zefflix-secret}
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider",
              "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - zefflix-net

networks:
  zefflix-net:
    driver: bridge

volumes:
  redis_data:
