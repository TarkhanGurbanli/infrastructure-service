server:
  port: 8761

spring:
  application:
    name: eureka-server

  security:
    user:
      name: ${EUREKA_USERNAME:eureka}
      password: ${EUREKA_PASSWORD:eureka-secret}

# ── Eureka Server konfiqurasiyası ──────────────────────────────────────────────
eureka:
  server:
    username: ${EUREKA_USERNAME:eureka}
    password: ${EUREKA_PASSWORD:eureka-secret}
    # Özünü qeydiyyatdan keçirmir (standalone mode)
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

  instance:
    hostname: localhost

  client:
    # Server özünü qeydiyyata almır
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret}@${eureka.instance.hostname}:${server.port}/eureka/

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    az.zefflix: INFO
