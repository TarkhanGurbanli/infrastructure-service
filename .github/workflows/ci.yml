name: CI — infrastructure-service

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DIST: 'temurin'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test all modules
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [ config-server, eureka-server, api-gateway ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
        continue-on-error: true

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build & Test ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:build --no-daemon --stacktrace
        env:
          JWT_SECRET: "ci-test-secret-key-32-chars-minimum!!"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/tests/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Docker build & push (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker — ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        module: [ config-server, eureka-server, api-gateway ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew :${{ matrix.module }}:bootJar --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.module }}
          file: ${{ matrix.module }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/zefflix-${{ matrix.module }}:latest
            ${{ env.IMAGE_PREFIX }}/zefflix-${{ matrix.module }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
